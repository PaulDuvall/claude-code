# Credential Detection Patterns
# Shared source of truth for shell and Python hooks
# Format: name|confidence|regex|description
#   confidence: high = specific to a known provider
#               heuristic = generic pattern matching (higher false-positive rate)

# Cloud provider API keys
aws_access_key|high|AKIA[0-9A-Z]{16}|AWS access key
anthropic_api_key|high|sk-ant-[a-zA-Z0-9]{95}|Anthropic API key
openai_api_key|high|sk-[a-zA-Z0-9]{32,}|OpenAI API key
google_api_key|high|AIza[0-9A-Za-z_-]{35}|Google API key
azure_key|high|[a-zA-Z0-9/+]{86}==|Azure key
gcp_service_account|high|"type":\s*"service_account"|GCP service account key

# Source control tokens
github_personal_token|high|ghp_[0-9a-zA-Z]{36}|GitHub personal access token
github_oauth_token|high|gho_[0-9a-zA-Z]{36}|GitHub OAuth token

# Messaging tokens
slack_bot_token|high|xoxb-[0-9]{10,13}-[0-9a-zA-Z-]+|Slack bot token
slack_user_token|high|xoxp-[0-9]{10,13}-[0-9a-zA-Z-]+|Slack user token
slack_webhook|high|hooks\.slack\.com/services/[A-Z0-9]{9}/[A-Z0-9]{11}/[a-zA-Z0-9]{24}|Slack webhook URL

# Payment provider keys
stripe_secret_key|high|sk_live_[0-9a-zA-Z]{24,}|Stripe secret key
stripe_restricted_key|high|rk_live_[0-9a-zA-Z]{24,}|Stripe restricted key

# Private keys and certificates
private_key|high|-----BEGIN [A-Z ]*PRIVATE KEY-----|Private key header

# Tokens
jwt_token|high|eyJ[a-zA-Z0-9+/=]{20,}\.[a-zA-Z0-9+/=]{20,}\.[a-zA-Z0-9+/=_-]{20,}|JWT token

# URLs with embedded credentials
credential_url|high|[a-zA-Z+]+://[^:]+:[^@]+@[^\s]+|Credentials in URL

# Generic patterns (heuristic — may produce false positives)
generic_api_key|heuristic|["']?[a-zA-Z0-9_-]*[aA][pP][iI][_-]?[kK][eE][yY]["']?\s*[:=]\s*["'][a-zA-Z0-9+/=]{20,}["']|Generic API key assignment
generic_secret|heuristic|["']?[a-zA-Z0-9_-]*[sS][eE][cC][rR][eE][tT]["']?\s*[:=]\s*["'][a-zA-Z0-9+/=]{20,}["']|Generic secret assignment
generic_password|heuristic|["']?[a-zA-Z0-9_-]*[pP][aA][sS][sS][wW][oO][rR][dD]["']?\s*[:=]\s*["'][^"']{8,}["']|Generic password assignment
